<template>
    <div class = "slds-p-round_xx-small">
        <lightning-slider label="Max Usage Limit" min="1" max="3" value={maxUsageLimit}
        onchange={handleChange_maxUsageLimit}></lightning-slider>
        <lightning-input label="date" type="date" value={date}
        onchange={handleChange_date}></lightning-input>
        <lightning-input label="Name" type="string" value={namePrefix}
        onchange={handleChange_namePrefix}></lightning-input>
        <lightning-input label="Premium voucher" type="toggle" message-toggle-active="Yes" message-toggle-inactive="Nope" value={date}
        onchange={handleChange_isPremium} checked={isPremium}></lightning-input>

    </div>
</template>
